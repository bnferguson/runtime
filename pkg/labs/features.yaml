features:
  - name: globalrouter
    predicate: GlobalRouter
    description: Use global NAT traversal router for connectivity
    default: false

  - name: distributedrunners
    predicate: DistributedRunners
    description: Schedule jobs across multiple runner nodes
    default: false

  - name: adminapi
    predicate: AdminAPI
    description: Enable the admin API for application management functions
    default: false

  - name: sagas
    predicate: Sagas
    description: Use saga-based crash-recoverable workflows for sandbox lifecycle
    default: false
