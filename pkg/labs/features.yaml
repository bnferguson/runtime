features:
  - name: globalrouter
    predicate: GlobalRouter
    description: Use global NAT traversal router for connectivity
    default: false

  - name: distributedrunners
    predicate: DistributedRunners
    description: Schedule jobs across multiple runner nodes
    default: false

  - name: usersubdomains
    predicate: UserSubdomains
    description: Allow claiming custom subdomains
    default: false

  - name: adminapi
    predicate: AdminAPI
    description: Enable the admin API for application management functions
    default: false

  - name: routeoidc
    predicate: RouteOIDC
    description: Enable OIDC authentication for HTTP routes
    default: false

  - name: addons
    predicate: Addons
    description: Enable the addon system for managed backing services
    default: true

  - name: sagas
    predicate: Sagas
    description: Use saga-based crash-recoverable workflows for sandbox lifecycle
    default: false
