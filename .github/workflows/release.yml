name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (tag, branch, or SHA). Leave empty to use current ref.'
        required: false
        default: ''
      update_latest:
        description: 'Update the latest channel (only applies to stable version tags)'
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ inputs.ref || github.ref_name }}
  cancel-in-progress: true

# Permissions needed for reusable workflow (test.yml) and release jobs
permissions:
  contents: write        # For package job
  pull-requests: read    # For golangci-lint in test.yml
  id-token: write        # For OIDC auth and attestations
  attestations: write    # For build artifact attestations

jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.set-ref.outputs.ref }}
      sha: ${{ steps.set-ref.outputs.sha }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref_name }}
      - id: set-ref
        run: |
          echo "ref=${{ inputs.ref || github.ref_name }}" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  test:
    needs: init
    uses: ./.github/workflows/test.yml
    with:
      ref: ${{ needs.init.outputs.ref }}
    secrets: inherit

  package:
    needs: [init]
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: depot-ubuntu-latest
          - arch: arm64
            runner: depot-ubuntu-latest-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        persist-credentials: false
        ref: ${{ needs.init.outputs.ref }}

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Install iso
      run: |
        go install miren.dev/iso/cmd/iso@latest
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

    - name: Build and package for ${{ matrix.arch }}
      env:
        GIT_BRANCH: ${{ needs.init.outputs.ref }}
        GIT_COMMIT: ${{ needs.init.outputs.sha }}
      run: |
        # Pass git info from GitHub Actions context to avoid git commands in iso
        export BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        make release-data
        mv release.tar.gz release-base-linux-${{ matrix.arch }}.tar.gz

    - name: Upload build artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: miren-base-linux-${{ matrix.arch }}
        path: release-base-linux-${{ matrix.arch }}.tar.gz
        retention-days: 1

  build-binaries:
    needs: [init]
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: depot-ubuntu-latest
          - os: linux
            arch: arm64
            runner: depot-ubuntu-latest-arm
          - os: darwin
            arch: amd64
            runner: macos-latest
          - os: darwin
            arch: arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        persist-credentials: false
        ref: ${{ needs.init.outputs.ref }}

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Build binary for ${{ matrix.os }}-${{ matrix.arch }}
      run: |
        GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} make bin/miren

    - name: Import certificate and sign macOS binary
      if: matrix.os == 'darwin'
      env:
        APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        APPLE_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_BASE64 }}
        APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
      run: |
        set -x  # Enable command tracing

        # Decode the certificate
        echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12

        # Create keychain
        KEYCHAIN_PWD="ci-keychain-password"
        security create-keychain -p "$KEYCHAIN_PWD" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain

        # Import application signing certificate
        security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/pkgbuild

        # Import installer signing certificate if provided separately
        if [ -n "$APPLE_INSTALLER_CERTIFICATE_BASE64" ]; then
          echo "$APPLE_INSTALLER_CERTIFICATE_BASE64" | base64 --decode > installer-certificate.p12
          security import installer-certificate.p12 -k build.keychain -P "$APPLE_INSTALLER_CERTIFICATE_PASSWORD" -T /usr/bin/pkgbuild -T /usr/bin/codesign
          rm installer-certificate.p12
        fi

        # Allow codesign and pkgbuild to access the keychain without prompting
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain

        # Get the application signing identity
        IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
        echo "Using signing identity: $IDENTITY"

        if [ -z "$IDENTITY" ]; then
          echo "ERROR: No Developer ID Application identity found"
          security find-identity -v -p codesigning build.keychain
          exit 1
        fi

        # Look up installer signing identity for .pkg signing
        INSTALLER_IDENTITY=$(security find-identity -v build.keychain | grep "Developer ID Installer" | head -1 | sed 's/.*"\(.*\)".*/\1/')
        if [ -n "$INSTALLER_IDENTITY" ]; then
          echo "Found installer identity: $INSTALLER_IDENTITY"
          echo "INSTALLER_IDENTITY=$INSTALLER_IDENTITY" >> "$GITHUB_ENV"
        else
          echo "WARNING: No Developer ID Installer identity found - .pkg will not be signed"
          security find-identity -v build.keychain
        fi

        # Sign the binary with hardened runtime
        codesign --force --options runtime \
          --sign "$IDENTITY" \
          --timestamp \
          bin/miren

        # Verify the signature
        codesign --verify --verbose=2 bin/miren

        # Clean up
        rm certificate.p12

    - name: Build macOS .pkg installer
      if: matrix.os == 'darwin' && env.INSTALLER_IDENTITY != '' && startsWith(needs.init.outputs.ref, 'v')
      run: |
        mkdir -p pkg-root/usr/local/bin
        cp bin/miren pkg-root/usr/local/bin/miren
        pkgbuild \
          --root pkg-root \
          --identifier dev.miren.cli \
          --version "${{ needs.init.outputs.ref }}" \
          --install-location / \
          --sign "$INSTALLER_IDENTITY" \
          miren-darwin-${{ matrix.arch }}.pkg
        rm -rf pkg-root

    - name: Notarize macOS artifacts
      if: matrix.os == 'darwin' && startsWith(needs.init.outputs.ref, 'v')
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        # Run bare-binary and .pkg notarization submits in parallel — each
        # one sits on Apple's notarization service for a couple of minutes,
        # so doing them concurrently roughly halves the wall time.

        zip -j miren-notarize.zip bin/miren

        xcrun notarytool submit miren-notarize.zip \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_ID_PASSWORD" \
          --team-id "$APPLE_TEAM_ID" \
          --wait &
        BIN_PID=$!

        PKG_NAME="miren-darwin-${{ matrix.arch }}.pkg"
        PKG_PID=
        if [ -f "$PKG_NAME" ]; then
          xcrun notarytool submit "$PKG_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait &
          PKG_PID=$!
        fi

        wait "$BIN_PID"; BIN_RC=$?
        PKG_RC=0
        if [ -n "$PKG_PID" ]; then
          wait "$PKG_PID"; PKG_RC=$?
        fi

        rm -f miren-notarize.zip

        if [ "$BIN_RC" -ne 0 ]; then
          echo "Bare-binary notarization failed (exit $BIN_RC)" >&2
          exit "$BIN_RC"
        fi
        if [ "$PKG_RC" -ne 0 ]; then
          echo ".pkg notarization failed (exit $PKG_RC)" >&2
          exit "$PKG_RC"
        fi

        # Bare binaries can't be stapled (only .app/.pkg/.dmg). Gatekeeper
        # checks the bare binary online on first run.
        if [ -f "$PKG_NAME" ]; then
          xcrun stapler staple "$PKG_NAME"
          xcrun stapler validate "$PKG_NAME"
        fi

    - name: Package binary
      run: |
        tar -czf miren-${{ matrix.os }}-${{ matrix.arch }}.tar.gz -C bin miren
        # Transitional: also produce .zip for older clients
        zip -j miren-${{ matrix.os }}-${{ matrix.arch }}.zip bin/miren

    - name: Upload build artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: miren-${{ matrix.os }}-${{ matrix.arch }}
        path: |
          miren-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          miren-${{ matrix.os }}-${{ matrix.arch }}.zip
        retention-days: 1

    - name: Upload macOS .pkg artifact
      if: matrix.os == 'darwin' && env.INSTALLER_IDENTITY != '' && startsWith(needs.init.outputs.ref, 'v')
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: miren-darwin-${{ matrix.arch }}-pkg
        path: miren-darwin-${{ matrix.arch }}.pkg
        retention-days: 1

  build-and-push-docker:
    needs: [init, test, package]
    runs-on: depot-ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          ref: ${{ needs.init.outputs.ref }}

      - name: Download amd64 package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: miren-base-linux-amd64
          path: artifacts/amd64

      - name: Download arm64 package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: miren-base-linux-arm64
          path: artifacts/arm64

      - name: Extract pre-built binaries
        run: |
          mkdir -p docker/artifacts/amd64 docker/artifacts/arm64
          tar -xzf artifacts/amd64/release-base-linux-amd64.tar.gz -C docker/artifacts/amd64
          tar -xzf artifacts/arm64/release-base-linux-arm64.tar.gz -C docker/artifacts/arm64

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Determine Docker tags
        id: docker-tags
        run: |
          REF_NAME="${{ needs.init.outputs.ref }}"
          TAGS="us-central1-docker.pkg.dev/miren-cloud/miren-oci/miren:$REF_NAME"

          # Add latest tag for stable releases only (exclude all prereleases)
          # Prereleases have a hyphen: v0.0.0-test.1, v0.1.0-rc.1, v1.0.0-beta.1, etc.
          # For workflow_dispatch, require explicit opt-in via update_latest flag
          if [[ "$REF_NAME" == v* ]] && [[ ! "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            if [[ "${{ github.event_name }}" == "push" ]] || [[ "${{ inputs.update_latest }}" == "true" ]]; then
              TAGS="$TAGS
          us-central1-docker.pkg.dev/miren-cloud/miren-oci/miren:latest"
            else
              echo "Skipping latest Docker tag (workflow_dispatch without update_latest flag)"
            fi
          fi

          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push miren Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./docker/Dockerfile.miren
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  upload-to-miren:
    needs: [init, test, package, build-binaries]
    runs-on: depot-ubuntu-latest
    concurrency:
      group: upload-to-miren-${{ needs.init.outputs.ref }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          ref: ${{ needs.init.outputs.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Get OIDC token
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        id: get-oidc-token
        with:
          script: |
            const token = await core.getIDToken()
            core.setOutput('token', token)

      - name: Upload to Miren API
        run: |
          set -eo pipefail

          REF_NAME="${{ needs.init.outputs.ref }}"
          TOKEN="${{ steps.get-oidc-token.outputs.token }}"

          # Determine if this is a tag build
          IS_TAG_BUILD=false
          IS_PRERELEASE=false
          if [[ "$REF_NAME" == v* ]]; then
            IS_TAG_BUILD=true
            TAG_NAME="$REF_NAME"
            echo "Building for tag: $TAG_NAME"

            # Check if this is a prerelease (has hyphen: v0.0.0-test.1, v0.1.0-rc.1, etc.)
            # Prereleases should NOT update the latest channel
            if [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+- ]]; then
              IS_PRERELEASE=true
              echo "Detected prerelease - will NOT update latest channel"
            fi
          fi

          # Determine upload paths (used by both artifact uploads and version.json)
          paths=()
          if [ "$IS_TAG_BUILD" = true ]; then
            # Always upload to the tag path
            paths+=("$TAG_NAME")
            # Only upload to latest for stable releases (not prereleases)
            # For workflow_dispatch, require explicit opt-in via update_latest flag
            if [ "$IS_PRERELEASE" = false ]; then
              if [[ "${{ github.event_name }}" == "push" ]] || [[ "${{ inputs.update_latest }}" == "true" ]]; then
                paths+=("latest")
              else
                echo "Skipping latest channel (workflow_dispatch without update_latest flag)"
              fi
            fi
          else
            # For branches, upload to branch path only
            paths+=("$REF_NAME")
          fi

          echo "Upload paths: ${paths[*]}"

          # --- Phase 1: Prepare checksums, manifest, and upload queue ---

          echo '[]' > artifact-manifest.json
          : > upload-queue.txt

          prepare_artifact() {
            local file_path="$1"
            local artifact_name="$2"
            local platform="${3:-}"
            local arch="${4:-}"

            echo "Preparing ${artifact_name}..."

            local checksum=$(sha256sum "${file_path}" | cut -d' ' -f1)
            echo "${checksum}  ${artifact_name}" > "${artifact_name}.sha256"

            local size=$(stat -c%s "${file_path}" 2>/dev/null || stat -f%z "${file_path}" 2>/dev/null || echo 0)

            local artifact_obj=$(jq -n \
              --arg name "${artifact_name}" \
              --arg sha256 "${checksum}" \
              --argjson size "${size}" \
              --arg platform "${platform}" \
              --arg arch "${arch}" \
              '{name: $name, sha256: $sha256, size: $size} |
               if $platform != "" then . + {platform: $platform} else . end |
               if $arch != "" then . + {arch: $arch} else . end')

            jq --argjson obj "$artifact_obj" '. += [$obj]' artifact-manifest.json > tmp.json && mv tmp.json artifact-manifest.json

            for path in "${paths[@]}"; do
              echo "${file_path}|https://api.miren.cloud/assets/release/miren/${path}/${artifact_name}" >> upload-queue.txt
              echo "${artifact_name}.sha256|https://api.miren.cloud/assets/release/miren/${path}/${artifact_name}.sha256" >> upload-queue.txt
            done
          }

          # Prepare release packages
          for arch in amd64 arm64; do
            prepare_artifact \
              "artifacts/miren-base-linux-${arch}/release-base-linux-${arch}.tar.gz" \
              "miren-base-linux-${arch}.tar.gz" \
              "linux" \
              "${arch}"
          done

          # Prepare binary artifacts (.tar.gz is the primary format)
          for os in linux darwin; do
            for arch in amd64 arm64; do
              prepare_artifact \
                "artifacts/miren-${os}-${arch}/miren-${os}-${arch}.tar.gz" \
                "miren-${os}-${arch}.tar.gz" \
                "${os}" \
                "${arch}"
              # Transitional: also upload .zip for older clients
              prepare_artifact \
                "artifacts/miren-${os}-${arch}/miren-${os}-${arch}.zip" \
                "miren-${os}-${arch}.zip" \
                "${os}" \
                "${arch}"
            done
          done

          # Prepare macOS .pkg installers (if they were built)
          for arch in amd64 arm64; do
            pkg_path="artifacts/miren-darwin-${arch}-pkg/miren-darwin-${arch}.pkg"
            if [ -f "$pkg_path" ]; then
              prepare_artifact \
                "$pkg_path" \
                "miren-darwin-${arch}.pkg" \
                "darwin" \
                "${arch}"
            fi
          done

          # Prepare docker-compose configuration
          prepare_artifact \
            "docker/docker-compose.yml" \
            "docker-compose.yml"

          # Generate version.json before uploads start
          echo "Generating version.json with artifact manifest..."

          COMMIT=$(git rev-parse HEAD)
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          BRANCH="${{ needs.init.outputs.ref }}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [[ $BRANCH =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VERSION="$BRANCH"
          elif [[ $BRANCH =~ ^release/(.*) ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            VERSION="$BRANCH:$COMMIT_SHORT"
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg commit "$COMMIT" \
            --arg branch "$BRANCH" \
            --arg build_date "$BUILD_DATE" \
            --slurpfile artifacts artifact-manifest.json \
            '{
              version: $version,
              commit: $commit,
              branch: $branch,
              build_date: $build_date,
              artifacts: $artifacts[0]
            }' > version.json

          echo "Generated version.json:"
          cat version.json

          TOTAL_UPLOADS=$(wc -l < upload-queue.txt)
          echo "Queued ${TOTAL_UPLOADS} artifact uploads"

          # --- Phase 2: Upload artifacts in parallel ---

          upload_one() {
            local file="$1" url="$2"
            echo "Uploading ${file} -> ${url}"
            curl --fail-with-body --retry 3 --retry-all-errors \
              --connect-timeout 10 --max-time 180 -X PUT \
              -H "Authorization: Bearer ${TOKEN}" \
              -F "file=@${file}" \
              "${url}"
          }

          MAX_PARALLEL=4
          FAILED=0
          running_pids=()

          while IFS='|' read -r file url; do
            # Wait if we've hit the concurrency cap
            while (( ${#running_pids[@]} >= MAX_PARALLEL )); do
              wait -n 2>/dev/null || FAILED=$((FAILED + 1))
              new_pids=()
              for pid in "${running_pids[@]}"; do
                if kill -0 "$pid" 2>/dev/null; then
                  new_pids+=("$pid")
                fi
              done
              running_pids=("${new_pids[@]}")
            done

            upload_one "$file" "$url" &
            running_pids+=($!)
          done < upload-queue.txt

          # Wait for all remaining uploads
          for pid in "${running_pids[@]}"; do
            wait "$pid" || FAILED=$((FAILED + 1))
          done

          if (( FAILED > 0 )); then
            echo "ERROR: ${FAILED} upload(s) failed"
            exit 1
          fi

          echo "All ${TOTAL_UPLOADS} artifact uploads succeeded"

          # --- Phase 3: Upload version.json last (must follow all artifacts) ---

          for path in "${paths[@]}"; do
            echo "Uploading version.json to $path..."
            curl --fail-with-body --retry 3 --retry-all-errors \
              --connect-timeout 10 --max-time 180 -X PUT \
              -H "Authorization: Bearer ${TOKEN}" \
              -F "file=@version.json" \
              "https://api.miren.cloud/assets/release/miren/${path}/version.json"
          done

  update-homebrew-tap:
    needs: [init, upload-to-miren]
    runs-on: ubuntu-latest
    # Only update homebrew tap for stable version tags (not prereleases, not branch builds)
    # For workflow_dispatch, require explicit opt-in via update_latest flag
    if: |
      startsWith(needs.init.outputs.ref, 'v') && !contains(needs.init.outputs.ref, '-') &&
      (github.event_name == 'push' || inputs.update_latest == true)
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_KEY }}
          owner: mirendev
          repositories: homebrew-tap

      - name: Trigger homebrew-tap update
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          VERSION="${{ needs.init.outputs.ref }}"
          echo "Triggering homebrew-tap update for $VERSION..."

          gh workflow run update-cask.yml \
            --repo mirendev/homebrew-tap \
            -f version="$VERSION"

          echo "Homebrew tap update triggered for $VERSION"

  notify:
    needs: [init, test, package, build-binaries, upload-to-miren, build-and-push-docker, update-homebrew-tap]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification on failure
        if: contains(needs.*.result, 'failure')
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ vars.SLACK_CHANNEL_ID }}",
              "text": "❌ Release workflow failed for ${{ needs.init.outputs.ref }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Release workflow failed*"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Ref:*\n`${{ needs.init.outputs.ref }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n`${{ needs.init.outputs.sha }}`"
                    }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                    }
                  ]
                }
              ],
              "unfurl_links": false,
              "unfurl_media": false
            }

      - name: Send Slack notification on success
        if: success() && needs.upload-to-miren.result == 'success'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          REF_NAME="${{ needs.init.outputs.ref }}"
          COMMIT_SHORT=$(echo "${{ needs.init.outputs.sha }}" | cut -c1-7)

          # Determine release type and channels
          if [[ "$REF_NAME" == v* ]]; then
            if [[ "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+- ]]; then
              RELEASE_TYPE="prerelease"
              CHANNELS="$REF_NAME"
            else
              RELEASE_TYPE="release"
              # Check if latest was updated
              if [[ "${{ github.event_name }}" == "push" ]] || [[ "${{ inputs.update_latest }}" == "true" ]]; then
                CHANNELS="$REF_NAME, latest"
              else
                CHANNELS="$REF_NAME"
              fi
            fi
          else
            RELEASE_TYPE="branch"
            CHANNELS="$REF_NAME"
          fi

          curl -X POST -H 'Content-type: application/json' \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            --data @- https://slack.com/api/chat.postMessage <<EOF
          {
            "channel": "${{ vars.SLACK_CHANNEL_ID }}",
            "text": "✅ Miren $RELEASE_TYPE $REF_NAME deployed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "✅ Miren $RELEASE_TYPE \`$REF_NAME\` deployed to $CHANNELS"
                }
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "<${{ github.server_url }}/${{ github.repository }}/commit/${{ needs.init.outputs.sha }}|$COMMIT_SHORT> • <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|workflow>"
                  }
                ]
              }
            ],
            "unfurl_links": false,
            "unfurl_media": false
          }
          EOF
