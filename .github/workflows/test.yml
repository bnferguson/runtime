name: Test

on:
  pull_request:
  merge_group:
  workflow_call:
    # Called by release.yml for main/tag builds
    inputs:
      ref:
        description: 'Git ref to test'
        required: false
        type: string
        default: ''

# Cancel in-progress runs when a new run is triggered on the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # Used by golangci-lint to emit annotations that are picked up by github
  contents: read
  # Used by golangci-lint for only-new-issues
  pull-requests: read

jobs:
  lint:
    runs-on: depot-ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref }}

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Install system dependencies
      run: |
        # Disable expensive operations on throwaway CI runners
        sudo sed -i 's/^DPkg::Post-Invoke.*//' /etc/apt/apt.conf.d/90_man-db || true
        # Install packages (depot runners have persistent images, so this is usually cached)
        sudo DEBIAN_FRONTEND=noninteractive apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends clang llvm

    - name: Cache Go tools
      id: cache-go-tools
      uses: actions/cache@v4
      with:
        path: ~/go/bin
        key: ${{ runner.os }}-go-tools-${{ hashFiles('go.mod') }}
        restore-keys: |
          ${{ runner.os }}-go-tools-

    - name: Install Go tools
      if: steps.cache-go-tools.outputs.cache-hit != 'true'
      run: |
        go install golang.org/x/tools/cmd/goimports@latest
        go install go.uber.org/mock/mockgen@latest

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v8
      with:
        version: v2.6.1

    - name: Check go.mod tidiness
      run: |
        # Run go mod tidy and check if there are any changes
        go mod tidy -diff
        if [ $? -ne 0 ]; then
          echo ""
          echo "Error: go.mod or go.sum is not tidy."
          echo "Please run 'go mod tidy' to fix module dependencies."
          exit 1
        fi
        echo "go.mod and go.sum are tidy."

    - name: Check go generate
      run: make generate-check

  test-groups:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref }}

    - name: Set test matrix
      id: set-matrix
      run: |
        MODULE=$(head -1 go.mod | awk '{print $2}')

        # Find all packages with test files via filesystem scan
        ALL_TEST_PKGS=$(find . -name '*_test.go' -not -path './vendor/*' -not -path './e2e/*' \
          | xargs -I{} dirname {} | sort -u \
          | sed "s|^\./|${MODULE}/|" | sed "s|^\.$$|${MODULE}|")

        # Get packages already assigned to groups
        GROUPED_PKGS=$(jq -r '.groups[].packages[]' hack/test-groups.json | sort)

        # Find packages with tests that aren't in any group
        UNGROUPED=$(comm -23 <(echo "$ALL_TEST_PKGS") <(echo "$GROUPED_PKGS"))

        MATRIX=$(jq -c '.groups' hack/test-groups.json)

        if [ -n "$UNGROUPED" ]; then
          echo "::warning::Packages not in test-groups.json (will run in extra group): $(echo $UNGROUPED | tr '\n' ' ')"
          EXTRA_PKGS=$(echo "$UNGROUPED" | jq -R -s 'split("\n") | map(select(. != ""))')
          MATRIX=$(echo "$MATRIX" | jq -c --argjson pkgs "$EXTRA_PKGS" '. + [{"runner": (length + 1), "estimated_s": 0, "packages": $pkgs}]')
        fi

        echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  test:
    name: test (runner ${{ matrix.group.runner }})
    needs: test-groups
    runs-on: depot-ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJson(needs.test-groups.outputs.matrix) }}
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref }}

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Resolve iso version
      id: iso-version
      run: |
        ISO_VERSION=$(go list -m -f '{{.Version}}' miren.dev/iso@latest)
        echo "version=$ISO_VERSION" >> $GITHUB_OUTPUT

    - name: Cache iso binary
      id: iso-cache
      uses: actions/cache@v4
      with:
        path: ~/go/bin/iso
        key: iso-binary-${{ steps.iso-version.outputs.version }}-${{ runner.os }}-${{ runner.arch }}

    - name: Install iso
      if: steps.iso-cache.outputs.cache-hit != 'true'
      run: go install miren.dev/iso/cmd/iso@latest

    - name: Add Go bin to PATH
      run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Restore iso cache
      uses: actions/cache@v4
      with:
        path: /tmp/iso-cache
        key: iso-cache-${{ hashFiles('go.sum') }}
        restore-keys: iso-cache-

    - name: Restore Docker image cache
      id: docker-image-cache
      uses: actions/cache@v4
      with:
        path: /tmp/iso-image.tar
        key: iso-image-${{ hashFiles('.iso/Dockerfile', '.iso/.bashrc', 'hack/containerd-config.toml') }}

    - name: Load cached Docker image
      if: steps.docker-image-cache.outputs.cache-hit == 'true'
      run: docker load < /tmp/iso-image.tar

    - name: Test (runner ${{ matrix.group.runner }})
      run: |
        PACKAGES=$(echo '${{ toJson(matrix.group.packages) }}' | jq -r '.[]' | tr '\n' ' ')
        ISO_CACHE_DIR=/tmp/iso-cache iso run DISABLE_NBD_TEST=1 bash hack/test.sh $PACKAGES -count=1 -failfast

    - name: Save Docker image to cache
      if: steps.docker-image-cache.outputs.cache-hit != 'true'
      run: docker save runtime-shell -o /tmp/iso-image.tar

  test-e2e:
    runs-on: depot-ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref }}

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Resolve iso version
      id: iso-version
      run: |
        ISO_VERSION=$(go list -m -f '{{.Version}}' miren.dev/iso@latest)
        echo "version=$ISO_VERSION" >> $GITHUB_OUTPUT

    - name: Cache iso binary
      id: iso-cache
      uses: actions/cache@v4
      with:
        path: ~/go/bin/iso
        key: iso-binary-${{ steps.iso-version.outputs.version }}-${{ runner.os }}-${{ runner.arch }}

    - name: Install iso
      if: steps.iso-cache.outputs.cache-hit != 'true'
      run: go install miren.dev/iso/cmd/iso@latest

    - name: Add Go bin to PATH
      run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Restore iso cache
      uses: actions/cache@v4
      with:
        path: /tmp/iso-cache
        key: iso-cache-e2e-${{ hashFiles('go.sum') }}
        restore-keys: iso-cache-e2e-

    - name: Restore Docker image cache
      id: docker-image-cache
      uses: actions/cache@v4
      with:
        path: /tmp/iso-image.tar
        key: iso-image-${{ hashFiles('.iso/Dockerfile', '.iso/.bashrc', 'hack/containerd-config.toml') }}

    - name: Load cached Docker image
      if: steps.docker-image-cache.outputs.cache-hit == 'true'
      run: docker load < /tmp/iso-image.tar

    - name: Test
      run: ISO_CACHE_DIR=/tmp/iso-cache iso run bash hack/test.sh ./e2e --tags=e2e -count=1 -failfast

    - name: Save Docker image to cache
      if: steps.docker-image-cache.outputs.cache-hit != 'true'
      run: docker save runtime-shell -o /tmp/iso-image.tar

  build:
    # Skip when called from release.yml - it has its own build jobs with signing
    if: github.event_name != 'workflow_call'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref }}

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Cross-compile all targets
      run: |
        pids=()
        for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
          GOOS="${target%/*}" GOARCH="${target#*/}"
          echo "Building $GOOS/$GOARCH..."
          GOOS=$GOOS GOARCH=$GOARCH go build -o /dev/null ./cmd/miren &
          pids+=($!)
        done
        failed=0
        for pid in "${pids[@]}"; do
          wait "$pid" || failed=1
        done
        exit $failed
