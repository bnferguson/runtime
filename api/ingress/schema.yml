domain: dev.miren.ingress
version: v1alpha
kinds:
  http_route:
    host:
      type: string
      doc: The hostname to match on for the application
      indexed: true
    app:
      type: ref
      doc: The application to route to
      indexed: true
      tags: [dev.miren.app_ref]
    default:
      type: bool
      indexed: true
      doc: Whether this is the default route for routing
    oidc_provider:
      type: ref
      doc: Reference to an OIDC provider for authentication
      indexed: true
    claim_mappings:
      type: component
      doc: Mappings from JWT claims to HTTP headers
      many: true
      attrs:
        claim:
          type: string
          doc: The JWT claim name (e.g. email, sub, name)
        header:
          type: string
          doc: The HTTP header name to inject (e.g. X-User-Email)
  oidc_provider:
    name:
      type: string
      doc: A unique name for this OIDC provider
      indexed: true
    provider_url:
      type: string
      doc: The OIDC provider URL (e.g. https://accounts.google.com)
      indexed: true
    client_id:
      type: string
      doc: The OAuth2 client ID
    client_secret:
      type: string
      doc: The OAuth2 client secret
    scopes:
      type: string
      doc: Space-separated list of OAuth2 scopes (e.g. "openid email profile")
