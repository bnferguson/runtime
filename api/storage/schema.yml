domain: dev.miren.storage
version: v1alpha
kinds:
  disk:
    name:
      type: string
      doc: Human-readable name for the disk
      required: true
      indexed: true

    size_gb:
      type: int
      doc: Storage capacity in gigabytes
      required: true

    filesystem:
      type: enum
      doc: Filesystem type for the disk
      choices: [ext4, xfs, btrfs]
      default: ext4

    status:
      type: enum
      doc: Current state of the disk
      choices: [provisioning, provisioned, attached, detached, deleting, error]
      default: provisioning
      indexed: true

    lsvd_volume_id:
      type: string
      doc: LSVD backend volume identifier
      indexed: true

    mode:
      type: enum
      doc: Disk I/O mode
      choices: [universal, accelerator]
      default: universal
      indexed: true

    volume_id:
      type: string
      doc: Volume identifier for universal/accelerator mode disks
      indexed: true

    remote_only:
      type: bool
      doc: If true, disk is stored only remotely without local replica
      default: false

    created_by:
      type: ref
      doc: Application that created this disk (for tracking purposes)
      indexed: true
      tags: [dev.miren.app_ref]

  disk_lease:
    disk_id:
      type: ref
      doc: Reference to the leased disk
      required: true
      indexed: true

    sandbox_id:
      type: ref
      doc: Reference to the sandbox using the disk
      indexed: true

    app_id:
      type: ref
      doc: Reference to the application (for debugging)
      indexed: true
      tags: [dev.miren.app_ref]

    status:
      type: enum
      doc: Current state of the lease
      choices: [pending, bound, failed, released]
      default: pending
      indexed: true
      # pending - Lease requested but not yet bound
      # bound - Lease successfully bound to disk
      # failed - Lease could not be bound (conflict or error)
      # released - Lease explicitly released

    mount:
      type: component
      doc: Mount configuration for the disk
      attrs:
        path:
          type: string
          doc: Mount path in the container
          required: true
        options:
          type: string
          doc: Mount options (e.g., "rw,noatime")
          default: "rw"
        read_only:
          type: bool
          doc: Whether the mount is read-only
          default: false

    acquired_at:
      type: time
      doc: When the lease was acquired

    node_id:
      type: ref
      doc: Node where the disk is mounted
      required: true

    error_message:
      type: string
      doc: Error details if lease binding failed

  lsvd_volume:
    name:
      type: string
      doc: Human-readable name for the volume (from parent disk)

    disk_id:
      type: ref
      doc: Reference to the parent Disk entity
      required: true
      indexed: true

    volume_id:
      type: string
      doc: The LSVD volume identifier (generated by lsvd-server)
      indexed: true

    size_gb:
      type: int
      doc: Volume size in gigabytes
      required: true

    filesystem:
      type: string
      doc: Filesystem type (ext4, xfs, btrfs)
      default: ext4

    remote_only:
      type: bool
      doc: If true, use only remote storage
      default: false

    desired_state:
      type: enum
      doc: What state should this volume be in
      choices: [vol_present, vol_absent]
      default: vol_present
      indexed: true

    actual_state:
      type: enum
      doc: Current state of the volume (set by lsvd-server)
      choices: [vol_pending, vol_creating, vol_ready, vol_deleting, vol_deleted, vol_error]
      default: vol_pending
      indexed: true

    error_message:
      type: string
      doc: Error details if actual_state is error

    node_id:
      type: ref
      doc: Node where this volume should be provisioned
      required: true
      indexed: true

  disk_volume:
    name:
      type: string
      doc: Human-readable name for the volume (from parent disk)

    disk_id:
      type: ref
      doc: Reference to the parent Disk entity
      required: true
      indexed: true

    volume_id:
      type: string
      doc: Volume identifier (generated during creation)
      indexed: true

    size_gb:
      type: int
      doc: Volume size in gigabytes
      required: true

    filesystem:
      type: string
      doc: Filesystem type (ext4, xfs, btrfs)
      default: ext4

    volume_mode:
      type: enum
      doc: Disk I/O mode
      choices: [vm_universal, vm_accelerator]
      default: vm_universal

    image_path:
      type: string
      doc: Path to backing image file

    desired_state:
      type: enum
      doc: What state should this volume be in
      choices: [dv_present, dv_absent]
      default: dv_present
      indexed: true

    actual_state:
      type: enum
      doc: Current state of the volume
      choices: [dv_pending, dv_creating, dv_ready, dv_deleting, dv_deleted, dv_error]
      default: dv_pending
      indexed: true

    error_message:
      type: string
      doc: Error details if actual_state is error

    mount_id:
      type: string
      doc: Override for the mount point directory name (defaults to entity suffix if empty)

    node_id:
      type: ref
      doc: Node where this volume should be provisioned
      required: true
      indexed: true

  disk_mount:
    volume_id:
      type: ref
      doc: Reference to the disk_volume entity
      required: true
      indexed: true

    disk_lease_id:
      type: ref
      doc: Reference to the parent DiskLease entity
      indexed: true

    mount_path:
      type: string
      doc: Path where the volume should be mounted
      required: true

    read_only:
      type: bool
      doc: Whether the mount is read-only
      default: false

    device_path:
      type: string
      doc: Full path to the device node (e.g., /dev/loopN)

    loop_device:
      type: string
      doc: Loop device name for universal mode

    desired_state:
      type: enum
      doc: What state should this mount be in
      choices: [dm_want_mounted, dm_want_unmounted]
      default: dm_want_mounted
      indexed: true

    actual_state:
      type: enum
      doc: Current state of the mount
      choices: [dm_pending, dm_attaching, dm_attached, dm_mounting, dm_mounted, dm_unmounting, dm_detaching, dm_detached, dm_error]
      default: dm_pending
      indexed: true

    node_id:
      type: ref
      doc: Node where this mount exists
      required: true
      indexed: true

    error_message:
      type: string
      doc: Error details if actual_state is error
