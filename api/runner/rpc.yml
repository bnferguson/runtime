name: runner
version: v1alpha
doc: Runner registration and management service

imports:
  standard:
    path: ../../pkg/rpc/standard/standard.yml
    import: miren.dev/runtime/pkg/rpc/standard

interfaces:
  - name: RunnerRegistration
    doc: Runner registration service for distributed runners
    methods:
      - name: CreateInvite
        index: 0
        doc: Create a new join token for a runner
        parameters:
          - name: labels
            type: list
            element: string
            doc: Labels to apply to the runner when it joins (key=value format)
          - name: expires_in_hours
            type: int32
            doc: Hours until the invite expires (default 1)
          - name: name
            type: string
            doc: Human-readable name for this invite
          - name: reusable
            type: bool
            doc: Create a reusable invite (not consumed on use)
          - name: ttl_seconds
            type: int64
            doc: Time-to-live in seconds. Takes precedence over expires_in_hours when >= 0. Use 0 for no expiry (reusable only). Use -1 to defer to expires_in_hours.
          - name: coordinator_addr
            type: string
            doc: Override coordinator address baked into the token
        results:
          - name: code
            type: string
            doc: The join token to give to the runner
          - name: expires_at
            type: standard.Timestamp
            doc: When the invite expires

      - name: Join
        index: 1
        public: true  # Allow unauthenticated access - token secret provides authentication
        doc: Join a runner to the coordinator using a join token
        parameters:
          - name: code
            type: string
            doc: The token secret (hex-encoded)
          - name: runner_id
            type: string
            doc: Unique identifier for this runner (generated by runner if not reconnecting)
          - name: listen_addr
            type: string
            doc: Address where the runner will listen for connections
          - name: version
            type: string
            doc: Runner software version
          - name: labels
            type: list
            element: string
            doc: Additional labels from the runner (key=value format)
          - name: name
            type: string
            doc: Human-readable name for this runner (defaults to hostname)
        results:
          - name: cert_pem
            type: bytes
            doc: Client certificate in PEM format
          - name: key_pem
            type: bytes
            doc: Private key in PEM format
          - name: ca_pem
            type: bytes
            doc: CA certificate in PEM format
          - name: coordinator_addr
            type: string
            doc: Address of the coordinator
          - name: runner_id
            type: string
            doc: The assigned or confirmed runner ID
          - name: etcd_endpoints
            type: list
            element: string
            doc: etcd endpoints for Flannel coordination
          - name: etcd_prefix
            type: string
            doc: etcd prefix for Flannel network
          - name: network_backend
            type: string
            doc: Network backend type (vxlan or wireguard)
          - name: victoriametrics_address
            type: string
            doc: Address of the VictoriaMetrics instance for metrics ingestion
          - name: victorialogs_address
            type: string
            doc: Address of the VictoriaLogs instance for log ingestion
          - name: error
            type: string
            doc: Error message if join failed

      - name: ListInvites
        index: 2
        doc: List all join tokens
        results:
          - name: invites
            type: list
            element: InviteInfo
            doc: List of pending invites

      - name: RevokeInvite
        index: 3
        doc: Revoke a join token
        parameters:
          - name: invite_id
            type: string
            doc: ID of the invite to revoke
        results:
          - name: success
            type: bool
            doc: Whether the revocation was successful
          - name: error
            type: string
            doc: Error message if revocation failed

      - name: ListRunners
        index: 4
        doc: List all registered runners
        results:
          - name: runners
            type: list
            element: RunnerInfo
            doc: List of registered runners

      - name: RemoveRunner
        index: 5
        doc: Remove a registered runner and clean up associated resources
        parameters:
          - name: query
            type: string
            doc: Runner to remove (name, ID, or short ID)
          - name: force
            type: bool
            doc: Force removal even if the runner has active sandboxes
        results:
          - name: name
            type: string
            doc: Name of the removed runner
          - name: runner_id
            type: string
            doc: Runner ID of the removed runner
          - name: removed_resources
            type: int32
            doc: Number of associated resources that were cleaned up
          - name: error
            type: string
            doc: Error message if removal failed

      - name: WorkloadIssuerInfo
        index: 6
        doc: |
          Report whether the coordinator has a workload identity issuer
          configured, and its issuer URL. Distributed runners call this once at
          startup to decide whether to mint workload identity tokens via the
          coordinator.
        results:
          - name: enabled
            type: bool
            doc: Whether a workload identity issuer is configured on the coordinator
          - name: issuer_url
            type: string
            doc: The issuer URL (iss claim anchor) when enabled

      - name: IssueWorkloadToken
        index: 7
        doc: |
          Mint a workload identity token for a sandbox. Distributed runners,
          which do not hold the cluster signing key, call this to obtain tokens
          signed by the coordinator. The application identity is derived from the
          sandbox by the coordinator, not supplied by the caller.
        parameters:
          - name: sandbox_id
            type: string
            doc: Sandbox ID the token is issued for
          - name: audience
            type: list
            element: string
            doc: Optional token audiences (defaults to "miren" when empty)
          - name: ttl_seconds
            type: int64
            doc: Optional token TTL in seconds (0 uses the issuer default)
        results:
          - name: token
            type: string
            doc: The signed workload identity token (JWT)
          - name: error
            type: string
            doc: Error message if issuance failed

      - name: RefreshCertificate
        index: 8
        public: true  # Authenticated in the handler via the caller's existing runner mTLS cert
        doc: |
          Re-issue a runner's server certificate with updated SANs. Used when a
          runner's listen address changes (e.g. a VM is recreated with a new IP
          but a persistent disk keeps the old, now-stale certificate). The caller
          must present its existing CA-signed runner certificate; the new cert
          preserves that certificate's CommonName.
        parameters:
          - name: listen_addr
            type: string
            doc: The runner's current listen address whose host should be covered by the new cert
        results:
          - name: cert_pem
            type: bytes
            doc: Re-issued certificate in PEM format
          - name: key_pem
            type: bytes
            doc: Private key for the re-issued certificate in PEM format
          - name: ca_pem
            type: bytes
            doc: CA certificate in PEM format
          - name: error
            type: string
            doc: Error message if the refresh failed

types:
  - type: InviteInfo
    doc: Information about a runner invite
    fields:
      - name: id
        type: string
        index: 0
        doc: Invite entity ID
      - name: status
        type: string
        index: 1
        doc: Invite status (pending, claimed, revoked, expired)
      - name: labels
        type: list
        element: string
        index: 2
        doc: Labels that will be applied to the runner
      - name: expires_at
        type: standard.Timestamp
        index: 3
        doc: When the invite expires
      - name: created_at
        type: standard.Timestamp
        index: 4
        doc: When the invite was created
      - name: claimed_by
        type: string
        index: 5
        doc: Runner ID that claimed this invite (if claimed)
      - name: claimed_at
        type: standard.Timestamp
        index: 6
        doc: When the invite was claimed (if claimed)
      - name: name
        type: string
        index: 7
        doc: Human-readable name
      - name: reusable
        type: bool
        index: 8
        doc: Whether this is a reusable invite
      - name: enrollment_count
        type: int64
        index: 9
        doc: Number of runners enrolled via this invite

  - type: RunnerInfo
    doc: Information about a registered runner
    fields:
      - name: id
        type: string
        index: 0
        doc: Node entity ID
      - name: runner_id
        type: string
        index: 1
        doc: Unique runner identifier
      - name: name
        type: string
        index: 2
        doc: Node name
      - name: short_id
        type: string
        index: 8
        doc: Short identifier for display
      - name: status
        type: string
        index: 3
        doc: Runner status (ready, disabled, unhealthy, unknown)
      - name: version
        type: string
        index: 4
        doc: Runner software version
      - name: api_address
        type: string
        index: 5
        doc: Address where the runner is reachable
      - name: labels
        type: list
        element: string
        index: 6
        doc: Labels on the runner (key=value format)
      - name: registered_at
        type: standard.Timestamp
        index: 7
        doc: When the runner first registered
