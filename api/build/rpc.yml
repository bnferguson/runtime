apiVersion: miren.dev/rpc/v1
kind: IDL

imports:
  stream:
    path: ../../pkg/rpc/stream/stream.yml
    import: miren.dev/runtime/pkg/rpc/stream

types:
  - type: Status
    fields:
      - name: kind
        type: string
        index: 0
      - name: update
        type: union
        union:
          - name: message
            type: string
            index: 1
          - name: buildkit
            type: bytes
            index: 2
          - name: error
            type: string
            index: 3
          - name: log
            type: LogEntry
            index: 4

  - type: LogEntry
    doc: A structured log message with severity level and extensible fields
    fields:
      - name: level
        type: string
        index: 0
        doc: Log level (info, warn)
      - name: text
        type: string
        index: 1
        doc: Short summary line
      - name: fields
        type: list
        element: LogField
        index: 2
        doc: Extensible key-value pairs for display (detail, link, etc.)

  - type: LogField
    doc: A key-value pair for structured log metadata
    fields:
      - name: key
        type: string
        index: 0
      - name: value
        type: string
        index: 1

  - type: AccessInfo
    doc: Information about how to access the deployed application
    fields:
      - name: hostnames
        type: '[]string'
        index: 0
        doc: Hostnames where the app is accessible (from configured routes)
      - name: default_route
        type: bool
        index: 1
        doc: Whether this app is the default route
      - name: cluster_hostname
        type: string
        index: 2
        doc: Cloud-provisioned DNS hostname for the cluster (if registered with Miren Cloud)

  - type: ServiceInfo
    doc: Information about a service detected in the app
    fields:
      - name: name
        type: string
        index: 0
        doc: Service name (e.g., web, worker)
      - name: command
        type: string
        index: 1
        doc: Command to run for this service
      - name: source
        type: string
        index: 2
        doc: Where the command came from (procfile, app_config, image)

  - type: DetectionEvent
    doc: An event detected during app analysis
    fields:
      - name: kind
        type: string
        index: 0
        doc: Event kind (file, package, framework, config, script, dir)
      - name: name
        type: string
        index: 1
        doc: Name of the detected item (e.g., Gemfile, rails, puma)
      - name: message
        type: string
        index: 2
        doc: Human-readable description of what was detected

  - type: AnalysisResult
    doc: Result of analyzing an app without building it
    fields:
      - name: stack
        type: string
        index: 0
        doc: Detected stack name (e.g., go, node, python, dockerfile)
      - name: services
        type: '[]ServiceInfo'
        index: 1
        doc: Services detected from Procfile, app.toml, or image
      - name: working_dir
        type: string
        index: 2
        doc: Working directory (from Dockerfile WORKDIR or stack default)
      - name: entrypoint
        type: string
        index: 3
        doc: Entrypoint command (from stack or image ENTRYPOINT)
      - name: app_name
        type: string
        index: 4
        doc: App name from app.toml if present
      - name: build_dockerfile
        type: string
        index: 5
        doc: Dockerfile path if using dockerfile build
      - name: env_vars
        type: '[]string'
        index: 6
        doc: Environment variable keys defined in app.toml (values not included for security)
      - name: events
        type: '[]DetectionEvent'
        index: 7
        doc: Detection events from stack analysis

  - type: EnvironmentVariable
    doc: An environment variable to set on the app during deploy
    fields:
      - name: key
        type: string
        index: 0
        doc: Environment variable name
      - name: value
        type: string
        index: 1
        doc: Environment variable value
      - name: sensitive
        type: bool
        index: 2
        doc: Whether the value should be masked in logs and output

  - type: FileManifestEntry
    doc: A file entry in the upload manifest with its hash for delta comparison
    fields:
      - name: path
        type: string
        index: 0
        doc: Relative file path
      - name: hash
        type: string
        index: 1
        doc: SHA-256 hash of the file contents
      - name: size
        type: int64
        index: 2
        doc: File size in bytes
      - name: mode
        type: int32
        index: 3
        doc: File permission mode

  - type: PrepareUploadResult
    doc: Result of preparing a delta upload session
    fields:
      - name: session_id
        type: string
        index: 0
        doc: Session ID for the subsequent buildFromPrepared call
      - name: needed_paths
        type: '[]string'
        index: 1
        doc: File paths that need to be uploaded (not found in cache)
      - name: cached_count
        type: int32
        index: 2
        doc: Number of files reused from the previous deploy cache

interfaces:
  - name: Stream
    methods:
      - name: recv
        parameters:
          - name: count
            type: int32
        results:
          - name: data
            type: bytes

  - name: Builder
    methods:
      - name: buildFromTar
        parameters:
          - name: application
            type: string
          - name: tardata
            type: stream.RecvStream[[]byte]
          - name: status
            type: stream.SendStream[*Status]
          - name: envVars
            type: '[]*EnvironmentVariable'
            doc: Environment variables to set on the app (optional, applied with source=manual)
        results:
          - name: version
            type: string
          - name: access_info
            type: '*AccessInfo'
            doc: Information about how to access the deployed app

      - name: analyzeApp
        doc: Analyze an app without building it, returning detected stack, services, and configuration
        parameters:
          - name: tardata
            type: stream.RecvStream[[]byte]
        results:
          - name: result
            type: '*AnalysisResult'

      - name: prepareUpload
        doc: Prepare a delta upload session by comparing a file manifest against cached source code
        parameters:
          - name: application
            type: string
          - name: manifest
            type: '[]*FileManifestEntry'
        results:
          - name: result
            type: '*PrepareUploadResult'

      - name: buildFromPrepared
        doc: Build from a prepared upload session with only the changed files
        parameters:
          - name: session_id
            type: string
          - name: tardata
            type: stream.RecvStream[[]byte]
          - name: status
            type: stream.SendStream[*Status]
          - name: envVars
            type: '[]*EnvironmentVariable'
            doc: Environment variables to set on the app (optional, applied with source=manual)
        results:
          - name: version
            type: string
          - name: access_info
            type: '*AccessInfo'
            doc: Information about how to access the deployed app

