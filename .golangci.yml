version: "2"

linters:
  enable:
    - exhaustive

  disable:
    - errcheck

  default: standard
  settings:
    exhaustive:
      # A bare `default:` does not by itself make a switch exhaustive; every
      # enum member must be listed (use a `//exhaustive:ignore` directive to
      # opt a specific switch out).
      default-signifies-exhaustive: false
  exclusions:
    paths:
      - "dataset/"
      - "disk/"
      - "lsvd/"
      - "pkg/cel"
      - "pkg/containerdx/"
      # Exclude generated files
      - ".*\\.gen\\.go$"

    rules:
      # Ignore unused test functions (disabled tests)
      - path: "_test\\.go$"
        linters:
          - unused
        text: "func noTest.*is unused"

      # Ignore unreachable code in specific packages
      - path: pkg/perf
        linters:
          - govet
        text: "unreachable code"

      # Ignore error handling issues in pkg/model (complex error handling that needs refactoring)
      - path: "pkg/model/"
        linters:
          - ineffassign
      - path: "pkg/model/"
        text: "SA4006"
        linters:
          - staticcheck

formatters:
  enable:
    - gofmt
    - goimports
